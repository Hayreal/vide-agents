name: Backend OpenCode Task
description: Create a backend task for the OpenCode backend agent.
title: "[backend] "
labels:
  - backend
body:
  - type: markdown
    attributes:
      value: |
        Put `/opencode` in the request body so OpenCode can start automatically on issue creation.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: Describe the backend change to implement.
      placeholder: Add a hello world script under ./backend.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Allowed Scope
      description: List the files or directories the backend agent may edit.
      placeholder: backend/**, server/**, api/**
    validations:
      required: true
  - type: textarea
    id: depends_on
    attributes:
      label: Depends On
      description: List prerequisite issue numbers that must finish before this backend task starts.
      placeholder: |
        #12
        #13
    validations:
      required: false
  - type: dropdown
    id: dependency_mode
    attributes:
      label: Dependency Mode
      description: Decide whether dependencies must only be closed, have a ready PR branch, or already be merged before this task starts.
      options:
        - closed
        - pr-ready
        - merged
      default: 0
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Define what must be true when the task is complete.
      placeholder: |
        - backend/hello.js exists
        - Running the script prints hello world
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: Agent Request
      description: The command or request OpenCode should follow.
      value: |
        /opencode

        Implement the backend change described above.
        Wait for every issue listed in Depends On to satisfy the selected Dependency Mode before starting.
        Stay within the Allowed Scope.
        If the task is blocked or outside backend scope, explain why and do not make unrelated changes.
    validations:
      required: true
