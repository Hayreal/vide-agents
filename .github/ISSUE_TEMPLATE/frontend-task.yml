name: Frontend OpenCode Task
description: Create a frontend task for the OpenCode frontend agent.
title: "[frontend] "
labels:
  - frontend
body:
  - type: markdown
    attributes:
      value: |
        Put `/opencode` in the request body so OpenCode can start automatically on issue creation.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: Describe the frontend change to implement.
      placeholder: Add a simple dashboard header component.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Allowed Scope
      description: List the files or directories the frontend agent may edit.
      placeholder: app/**, components/**, styles/**
    validations:
      required: true
  - type: textarea
    id: depends_on
    attributes:
      label: Depends On
      description: List prerequisite issue numbers that must finish before this frontend task starts.
      placeholder: |
        #12
        #13
    validations:
      required: false
  - type: dropdown
    id: dependency_mode
    attributes:
      label: Dependency Mode
      description: Decide whether dependencies only need to be closed or must also have merged code before this task starts.
      options:
        - closed
        - merged
      default: 0
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Define what must be true when the task is complete.
      placeholder: |
        - UI renders without errors
        - Layout works on desktop and mobile
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: Agent Request
      description: The command or request OpenCode should follow.
      value: |
        /opencode

        Implement the frontend change described above.
        Wait for every issue listed in Depends On to satisfy the selected Dependency Mode before starting.
        Stay within the Allowed Scope.
        If the task is blocked or outside frontend scope, explain why and do not make unrelated changes.
    validations:
      required: true
