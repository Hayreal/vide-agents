name: Frontend Agent Task
description: Create a task for the frontend Claude agent.
title: "[frontend] "
labels:
  - frontend
body:
  - type: markdown
    attributes:
      value: |
        Add `@claude` in the request body so the Frontend Agent starts automatically.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: Describe the user-facing change to implement.
      placeholder: Add a dashboard header with filters and summary cards.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Allowed Scope
      description: List the frontend files or directories this agent may touch.
      placeholder: components/dashboard, app/dashboard, styles/dashboard.css
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Define what must be true for this task to be done.
      placeholder: |
        - Header renders on desktop and mobile
        - Filters update visible data
        - Existing layout remains intact
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: Agent Request
      description: Put the exact request for Claude here.
      value: |
        @claude

        Implement the frontend change described above.
        Stay within the allowed scope.
        If the task is blocked or outside frontend scope, explain why and do not make unrelated changes.
    validations:
      required: true
