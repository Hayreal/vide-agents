name: Test OpenCode Task
description: Create a test task for the OpenCode test agent.
title: "[test] "
labels:
  - test
body:
  - type: markdown
    attributes:
      value: |
        Put `/opencode` in the request body so OpenCode can start automatically on issue creation.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: Describe the tests or verification changes to implement.
      placeholder: Add tests for the backend hello world script.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Allowed Scope
      description: List the files or directories the test agent may edit.
      placeholder: tests/**, test/**, fixtures/**
    validations:
      required: true
  - type: textarea
    id: depends_on
    attributes:
      label: Depends On
      description: List prerequisite issue numbers that must finish before this test task starts.
      placeholder: |
        #12
        #13
    validations:
      required: false
  - type: dropdown
    id: dependency_mode
    attributes:
      label: Dependency Mode
      description: Decide whether dependencies must only be closed, have a ready PR branch, or already be merged before this task starts.
      options:
        - closed
        - pr-ready
        - merged
      default: 1
    validations:
      required: true
  - type: dropdown
    id: auto_trigger_on_ready
    attributes:
      label: Auto Trigger On Ready
      description: Decide whether the workflow should automatically start this test issue once its dependencies are satisfied.
      options:
        - yes
        - no
      default: 0
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Define only the implemented behavior this test task must verify. Do not include future or out-of-scope behavior.
      placeholder: |
        - Includes a runnable automated test
        - Covers the expected output
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: Agent Request
      description: The command or request OpenCode should follow.
      value: |
        /opencode

        Implement the test change described above.
        Wait for every issue listed in Depends On to satisfy the selected Dependency Mode before starting.
        If Auto Trigger On Ready is yes, begin automatically once dependencies are ready.
        Test only the functionality that is explicitly in scope for this issue and its implemented dependencies.
        Do not test future, unrelated, or not-yet-implemented behavior.
        Stay within the Allowed Scope.
        If the task is blocked or outside test scope, explain why and do not make unrelated changes.
    validations:
      required: true
