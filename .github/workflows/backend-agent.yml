name: Backend Agent

on:
  issues:
    types: [opened, reopened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  backend:
    if: |
      contains(github.event.issue.labels.*.name, 'backend') &&
      (
        (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
      )
    uses: ./.github/workflows/claude-agent-base.yml
    with:
      agent_name: Backend Agent
      agent_label: backend
      branch_prefix: claude-backend
      scope_summary: APIs, server logic, data access, and backend integration code.
      scope_rules: |
        - Prefer editing backend-facing files only, such as api/, server/, db/, migrations/, services/, or src/ server modules.
        - Do not spend the change budget on UI polish, frontend styling, or broad test refactors.
        - If the task is mostly frontend or QA work, leave the tree unchanged and say the issue is out of scope.
