name: Claude Agent Base

on:
  workflow_call:
    inputs:
      agent_name:
        required: true
        type: string
      agent_label:
        required: true
        type: string
      branch_prefix:
        required: true
        type: string
      scope_summary:
        required: true
        type: string
      scope_rules:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    concurrency:
      group: ${{ inputs.branch_prefix }}-${{ github.event.issue.number || github.run_id }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install and configure Claude Code Router
        run: |
          npm install -g ccr-next
          mkdir -p ~/.claude-code-router
          cat <<'EOF' > ~/.claude-code-router/config.json
          {
            "Providers": [
              {
                "name": "deepseek",
                "api_base_url": "https://api.deepseek.com/chat/completions",
                "api_key": "${{ secrets.DEEPSEEK_API_KEY }}",
                "models": ["deepseek-chat", "deepseek-reasoner"],
                "transformer": {
                  "use": ["deepseek"],
                  "deepseek-chat": {
                    "use": ["tooluse"]
                  }
                }
              }
            ],
            "Router": {
              "default": "deepseek,deepseek-chat",
              "background": "deepseek,deepseek-chat",
              "think": "deepseek,deepseek-reasoner"
            }
          }
          EOF

      - name: Build Claude prompt
        shell: bash
        run: |
          cat > claude_prompt.txt <<EOF
          You are running inside GitHub Actions on a checked-out repository.

          Role:
          - You are the ${{ inputs.agent_name }} implementation agent.
          - Only work on tasks that match the ${{ inputs.agent_label }} issue label.

          Goal:
          - Implement the issue directly in the repository when a reasonable change is possible.
          - Keep the change small, targeted, and aligned with the existing style.
          - Do not stop at analysis if you can safely implement the request.

          Scope:
          - ${{ inputs.scope_summary }}

          Scope guardrails:
          ${{ inputs.scope_rules }}

          Output rules:
          - Print a concise final summary of what you changed.
          - If the request is outside your scope or unclear, leave the working tree unchanged and say so.
          - Do not ask for interactive confirmation.

          Event payload:
          event_name: ${{ github.event_name }}
          repository: ${{ github.repository }}
          actor: ${{ github.actor }}

          issue_number: ${{ github.event.issue.number }}
          issue_title: ${{ github.event.issue.title || '' }}
          issue_labels: ${{ join(github.event.issue.labels.*.name, ', ') }}
          issue_body:
          ${{ github.event.issue.body || '' }}

          comment_body:
          ${{ github.event.comment.body || '' }}
          EOF

      - name: Start ccr and run Claude Code
        env:
          ANTHROPIC_BASE_URL: http://localhost:3456
          ANTHROPIC_AUTH_TOKEN: dummy
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail
          ccr start &>/tmp/ccr.log &
          echo "Waiting for ccr..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:3456 > /dev/null 2>&1; then
              echo "ccr ready"
              break
            fi
            sleep 1
          done

          ccr code "$(cat claude_prompt.txt)" \
            --output-format text \
            --dangerously-skip-permissions \
            --no-session-persistence \
            --max-turns 15 \
            --allowed-tools "Read,Write,Edit,Bash(git:*),Bash(gh:*)" | tee claude_output.txt

          echo "=== ccr logs ==="
          cat /tmp/ccr.log

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch, commit, and push
        id: push
        if: steps.changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          issue_number="${{ github.event.issue.number }}"
          short_sha="$(git rev-parse --short HEAD)"
          branch="${{ inputs.branch_prefix }}/issue-${issue_number}-${short_sha}"

          git checkout -b "$branch"
          git add -A
          git commit -m "${{ inputs.agent_name }}: address issue #${issue_number}"
          git push origin "$branch"

          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Create PR
        id: pr
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          issue_number="${{ github.event.issue.number }}"
          {
            echo "Automated changes generated by the ${{ inputs.agent_name }} agent."
            echo
            echo "Closes #${issue_number}"
            echo
            echo "Agent label: ${{ inputs.agent_label }}"
            echo "Scope: ${{ inputs.scope_summary }}"
            echo
            echo "Summary:"
            sed -n '1,120p' claude_output.txt
          } > pr_body.md

          pr_url="$(gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "${{ steps.push.outputs.branch }}" \
            --title "${{ inputs.agent_name }}: resolve issue #${issue_number}" \
            --body-file pr_body.md)"
          echo "url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Comment on issue with PR link
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          {
            echo "${{ inputs.agent_name }} created a pull request for this issue:"
            echo
            echo "${{ steps.pr.outputs.url }}"
            echo
            echo "Summary:"
            sed -n '1,120p' claude_output.txt
          } > issue_comment.md

          gh issue comment "${{ github.event.issue.number }}" --body-file issue_comment.md

      - name: Comment when no changes were made
        if: steps.changes.outputs.has_changes != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          {
            echo "${{ inputs.agent_name }} finished processing this issue but did not produce repository changes."
            echo
            echo "Summary:"
            sed -n '1,120p' claude_output.txt
          } > issue_comment.md

          gh issue comment "${{ github.event.issue.number }}" --body-file issue_comment.md
