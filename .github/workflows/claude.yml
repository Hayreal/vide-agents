name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    concurrency:
      group: claude-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install and configure Claude Code Router
        run: |
          npm install -g ccr-next
          mkdir -p ~/.claude-code-router
          cat << 'CEOF' > ~/.claude-code-router/config.json
          {
            "Providers": [
              {
                "name": "deepseek",
                "api_base_url": "https://api.deepseek.com/chat/completions",
                "api_key": "${{ secrets.DEEPSEEK_API_KEY }}",
                "models": ["deepseek-chat", "deepseek-reasoner"]
              }
            ],
            "Router": {
              "default": "deepseek,deepseek-chat"
            }
          }
          CEOF

      - name: Start ccr and run Claude Code
        env:
          ANTHROPIC_BASE_URL: http://localhost:3456
          ANTHROPIC_AUTH_TOKEN: dummy
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ccr start &>/tmp/ccr.log &
          echo "Waiting for ccr..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:3456 > /dev/null 2>&1; then
              echo "ccr ready"
              break
            fi
            sleep 1
          done

          claude -p "${{ github.event.comment.body || github.event.pull_request.body || github.event.issue.body }}" \
            --output-format text \
            --dangerously-skip-permissions \
            --no-session-persistence \
            --max-turns 15 \
            --allowed-tools "Read,Write,Edit,Bash(git:*),Bash(gh:*)"

          echo "=== ccr logs ==="
          cat /tmp/ccr.log
