name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    concurrency:
      group: claude-${{ github.event.pull_request.number || github.event.issue.number || github.ref || github.run_id }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install and configure Claude Code Router
        run: |
          npm install -g ccr-next
          mkdir -p ~/.claude-code-router
          cat << 'CEOF' > ~/.claude-code-router/config.json
          {
            "Providers": [
              {
                "name": "deepseek",
                "api_base_url": "https://api.deepseek.com/chat/completions",
                "api_key": "${{ secrets.DEEPSEEK_API_KEY }}",
                "models": ["deepseek-chat", "deepseek-reasoner"]
              }
            ],
            "Router": {
              "default": "deepseek,deepseek-chat"
            }
          }
          CEOF

      - name: Build Claude prompt
        id: prompt
        shell: bash
        run: |
          cat > claude_prompt.txt <<'EOF'
          You are running inside GitHub Actions on a checked-out repository.

          Goal:
          - If this request is an issue asking for implementation work, make the requested code changes directly in the repository.
          - Keep changes minimal and aligned with the existing style.
          - Do not stop at analysis if a reasonable implementation is possible.
          - If the request is unclear or there is nothing to change safely, leave the working tree unchanged and explain that in your final response.

          Output rules:
          - Print a concise final summary of what you changed.
          - Do not ask for interactive confirmation.

          Event payload:
          EOF

          {
            echo "event_name: ${{ github.event_name }}"
            echo "repository: ${{ github.repository }}"
            echo "actor: ${{ github.actor }}"
            echo "ref: ${{ github.ref }}"
            echo
            echo "issue_title: ${{ github.event.issue.title || '' }}"
            echo "issue_body:"
            printf '%s\n' "${{ github.event.issue.body || '' }}"
            echo
            echo "comment_body:"
            printf '%s\n' "${{ github.event.comment.body || '' }}"
            echo
            echo "pull_request_title: ${{ github.event.pull_request.title || '' }}"
            echo "pull_request_body:"
            printf '%s\n' "${{ github.event.pull_request.body || '' }}"
          } >> claude_prompt.txt

      - name: Start ccr and run Claude Code
        env:
          ANTHROPIC_BASE_URL: http://localhost:3456
          ANTHROPIC_AUTH_TOKEN: dummy
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ccr start &>/tmp/ccr.log &
          echo "Waiting for ccr..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:3456 > /dev/null 2>&1; then
              echo "ccr ready"
              break
            fi
            sleep 1
          done

          claude -p "$(cat claude_prompt.txt)" \
            --output-format text \
            --dangerously-skip-permissions \
            --no-session-persistence \
            --max-turns 15 \
            --allowed-tools "Read,Write,Edit,Bash(git:*),Bash(gh:*)" | tee claude_output.txt

          echo "=== ccr logs ==="
          cat /tmp/ccr.log

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch, commit, and push
        id: push
        if: steps.changes.outputs.has_changes == 'true' && github.event_name != 'pull_request'
        shell: bash
        run: |
          issue_number="${{ github.event.issue.number || github.event.pull_request.number }}"
          short_sha="$(git rev-parse --short HEAD)"
          branch="claude/issue-${issue_number}-${short_sha}"

          git checkout -b "$branch"
          git add -A
          git commit -m "claude: address issue #${issue_number}"
          git push origin "$branch"

          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Create PR
        id: pr
        if: steps.changes.outputs.has_changes == 'true' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          issue_number="${{ github.event.issue.number }}"
          {
            echo "Automated changes generated by Claude Code."
            echo
            echo "Closes #${issue_number}"
            echo
            echo "Summary:"
            sed -n '1,120p' claude_output.txt
          } > pr_body.md

          pr_url="$(gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "${{ steps.push.outputs.branch }}" \
            --title "Claude: resolve issue #${issue_number}" \
            --body-file pr_body.md)"
          echo "url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Comment on issue with PR link
        if: steps.changes.outputs.has_changes == 'true' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          {
            echo "Claude created a pull request for this issue:"
            echo
            echo "${{ steps.pr.outputs.url }}"
            echo
            echo "Summary:"
            sed -n '1,120p' claude_output.txt
          } > issue_comment.md

          gh issue comment "${{ github.event.issue.number }}" --body-file issue_comment.md

      - name: Comment when no changes were made
        if: steps.changes.outputs.has_changes != 'true' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          {
            echo "Claude finished processing this issue but did not produce repository changes."
            echo
            echo "Summary:"
            sed -n '1,120p' claude_output.txt
          } > issue_comment.md

          gh issue comment "${{ github.event.issue.number }}" --body-file issue_comment.md
