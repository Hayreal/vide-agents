name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    concurrency:
      group: claude-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code
        env:
          ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: deepseek-v4-pro
          ANTHROPIC_DEFAULT_SONNET_MODEL: deepseek-v4-pro
          ANTHROPIC_DEFAULT_HAIKU_MODEL: deepseek-v4-flash
          CLAUDE_CODE_SUBAGENT_MODEL: deepseek-v4-flash
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude -p "${{ github.event.comment.body || github.event.pull_request.body || github.event.issue.body }}" \
            --output-format text \
            --dangerously-skip-permissions \
            --no-session-persistence \
            --max-turns 15 \
            --allowed-tools "Read,Write,Edit,Bash(git:*),Bash(gh:*)"
