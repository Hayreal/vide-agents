name: Frontend Agent

on:
  issues:
    types: [opened, reopened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  frontend:
    if: |
      contains(github.event.issue.labels.*.name, 'frontend') &&
      (
        (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
      )
    uses: ./.github/workflows/claude-agent-base.yml
    with:
      agent_name: Frontend Agent
      agent_label: frontend
      branch_prefix: claude-frontend
      scope_summary: UI implementation, styling, components, and client-side behavior.
      scope_rules: |
        - Prefer editing frontend-facing files only, such as web/, ui/, app/, components/, pages/, styles/, or src/ frontend modules.
        - Do not make backend, database, or infrastructure changes unless the issue explicitly says they are required and tiny.
        - If the task is mostly backend or test work, leave the tree unchanged and say the issue is out of scope.
