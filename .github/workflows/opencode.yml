name: OpenCode

on:
  issues:
    types: [opened, reopened, edited, labeled]
  issue_comment:
    types: [created]

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

jobs:
  opencode:
    if: |
      (
        github.event_name == 'issues' &&
        (
          contains(github.event.issue.body, '/opencode') ||
          contains(github.event.issue.body, '/oc')
        )
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.comment.user.type != 'Bot' &&
        (
          contains(github.event.comment.body, '/opencode') ||
          contains(github.event.comment.body, '/oc')
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure GitHub auth for push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

      - name: Check issue dependencies
        id: deps
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request

          issue_body = os.environ.get("ISSUE_BODY", "")
          repo = os.environ["REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          issue_number = os.environ["ISSUE_NUMBER"]
          output_path = os.environ["GITHUB_OUTPUT"]

          pattern = re.compile(r"^### Depends On\s*(.*?)(?=^### |\Z)", re.S | re.M)
          match = pattern.search(issue_body)
          dependency_numbers = []
          if match:
              dependency_numbers = re.findall(r"#(\d+)", match.group(1))

          mode_match = re.search(r"^### Dependency Mode\s*(.*?)(?=^### |\Z)", issue_body, re.S | re.M)
          dependency_mode = "closed"
          if mode_match:
              normalized = mode_match.group(1).strip().lower()
              if "merged" in normalized:
                  dependency_mode = "merged"

          def graphql(payload):
              req = urllib.request.Request(
                  "https://api.github.com/graphql",
                  data=json.dumps(payload).encode("utf-8"),
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "User-Agent": "github-actions"
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req) as resp:
                  return json.load(resp)

          blocked = []
          for dep in dependency_numbers:
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/issues/{dep}",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "User-Agent": "github-actions"
                  },
              )
              with urllib.request.urlopen(req) as resp:
                  data = json.load(resp)
              issue_closed = data.get("state", "").lower() == "closed"
              if not issue_closed:
                  blocked.append({
                      "number": dep,
                      "title": data.get("title", ""),
                      "state": data.get("state", "open"),
                      "reason": "issue is not closed",
                  })
                  continue

              if dependency_mode == "merged":
                  owner, name = repo.split("/", 1)
                  query = {
                      "query": """
                        query($owner: String!, $name: String!, $number: Int!) {
                          repository(owner: $owner, name: $name) {
                            issue(number: $number) {
                              closedByPullRequestsReferences(first: 20) {
                                nodes {
                                  number
                                  merged
                                  state
                                  url
                                }
                              }
                            }
                          }
                        }
                      """,
                      "variables": {
                          "owner": owner,
                          "name": name,
                          "number": int(dep),
                      },
                  }
                  result = graphql(query)
                  nodes = (((result.get("data") or {}).get("repository") or {}).get("issue") or {}).get("closedByPullRequestsReferences", {}).get("nodes", [])
                  has_merged_pr = any(node.get("merged") is True or str(node.get("state", "")).upper() == "MERGED" for node in nodes)
                  if not has_merged_pr:
                      blocked.append({
                          "number": dep,
                          "title": data.get("title", ""),
                          "state": data.get("state", "closed"),
                          "reason": "no merged PR is linked to this dependency issue",
                      })

          with open(output_path, "a", encoding="utf-8") as fh:
              fh.write(f"dependency_mode={dependency_mode}\n")
              fh.write(f"has_dependencies={'true' if dependency_numbers else 'false'}\n")
              fh.write(f"should_run={'false' if blocked else 'true'}\n")
              if blocked:
                  lines = [
                      "This issue is waiting on dependency issues before OpenCode can run.",
                      "",
                      f"Current issue: #{issue_number}",
                      f"Dependency mode: {dependency_mode}",
                      "",
                      "Still blocked by:",
                  ]
                  for item in blocked:
                      lines.append(f"- #{item['number']} {item['title']} ({item['state']}; {item['reason']})")
                  lines.append("")
                  lines.append("Satisfy the dependency requirements, then comment `/opencode` again.")
                  message = "%0A".join(line.replace("%", "%25").replace("\n", "%0A").replace("\r", "%0D") for line in lines)
                  fh.write(f"blocked_message={message}\n")
          PY

      - name: Comment when dependencies are not ready
        if: steps.deps.outputs.should_run == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "$(printf '%b' "${{ steps.deps.outputs.blocked_message }}")"

      - name: Run OpenCode
        if: steps.deps.outputs.should_run != 'false'
        uses: anomalyco/opencode/github@latest
        with:
          model: deepseek/deepseek-chat
          agent: ${{ (contains(github.event.issue.labels.*.name, 'frontend') || startsWith(github.event.issue.title, '[frontend]')) && 'frontend' || (contains(github.event.issue.labels.*.name, 'backend') || startsWith(github.event.issue.title, '[backend]')) && 'backend' || (contains(github.event.issue.labels.*.name, 'test') || startsWith(github.event.issue.title, '[test]')) && 'test' || 'build' }}
          use_github_token: true
          mentions: true
          share: true
          prompt: ${{ github.event_name == 'issues' && 'Use the issue body as the task request. Respect the selected agent scope, the Allowed Scope section, the Depends On section, and the Dependency Mode from the issue. Do not start implementation until listed dependency issues satisfy the selected dependency mode. If the task is actionable, implement it in a new branch and open a pull request. If it is unclear or out of scope, explain why without making unrelated changes.' || 'Use the original issue body as the source of truth for the task. Treat the latest human comment only as a retrigger request, not as a replacement task description. Ignore prior bot comments and summaries. Respect the selected agent scope, Allowed Scope section, Depends On requirements, and Dependency Mode from the issue. Do not start implementation until listed dependency issues satisfy the selected dependency mode. If the task is actionable, implement it in a new branch and open a pull request.' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENCODE_CONFIG: ${{ github.workspace }}/opencode.json
