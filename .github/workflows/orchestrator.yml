name: OpenCode Orchestrator

on:
  issues:
    types: [closed]
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  trigger-ready-tests:
    if: |
      (github.event_name == 'issues') ||
      (github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    steps:
      - name: Auto-trigger ready test issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.parse
          import urllib.request

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPOSITORY"]

          def rest(url):
              req = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "User-Agent": "github-actions"
                  },
              )
              with urllib.request.urlopen(req) as resp:
                  return json.load(resp)

          def graphql(payload):
              req = urllib.request.Request(
                  "https://api.github.com/graphql",
                  data=json.dumps(payload).encode("utf-8"),
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "User-Agent": "github-actions"
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req) as resp:
                  return json.load(resp)

          issues = rest(f"https://api.github.com/repos/{repo}/issues?state=open&labels=test&per_page=100")
          owner, name = repo.split("/", 1)

          for issue in issues:
              body = issue.get("body") or ""
              title = issue.get("title") or ""
              if not title.startswith("[test]") and "test" not in [label.get("name") for label in issue.get("labels", [])]:
                  continue

              if "/opencode" not in body and "/oc" not in body:
                  continue

              auto_match = re.search(r"^### Auto Trigger On Ready\s*(.*?)(?=^### |\Z)", body, re.S | re.M)
              auto_trigger = "no"
              if auto_match:
                  normalized = auto_match.group(1).strip().lower()
                  if "yes" in normalized:
                      auto_trigger = "yes"

              if auto_trigger != "yes":
                  continue

              deps_match = re.search(r"^### Depends On\s*(.*?)(?=^### |\Z)", body, re.S | re.M)
              dependency_numbers = []
              if deps_match:
                  dependency_numbers = re.findall(r"#(\d+)", deps_match.group(1))

              if not dependency_numbers:
                  continue

              mode_match = re.search(r"^### Dependency Mode\s*(.*?)(?=^### |\Z)", body, re.S | re.M)
              dependency_mode = "closed"
              if mode_match:
                  normalized = mode_match.group(1).strip().lower()
                  if "merged" in normalized:
                      dependency_mode = "merged"
                  elif "pr-ready" in normalized:
                      dependency_mode = "pr-ready"

              def linked_pulls(dep):
                  query = urllib.parse.quote(f'repo:{repo} is:pr "#{dep}"')
                  results = rest(f"https://api.github.com/search/issues?q={query}&per_page=20&sort=updated&order=desc")
                  pulls = []
                  for item in results.get("items", []):
                      number = item.get("number")
                      if not number:
                          continue
                      pulls.append(rest(f"https://api.github.com/repos/{repo}/pulls/{number}"))
                  return pulls

              blocked = False
              for dep in dependency_numbers:
                  dep_issue = rest(f"https://api.github.com/repos/{repo}/issues/{dep}")
                  if dependency_mode == "closed" and dep_issue.get("state", "").lower() != "closed":
                      blocked = True
                      break

                  if dependency_mode in ("pr-ready", "merged"):
                      pulls = linked_pulls(dep)
                      open_pulls = [pull for pull in pulls if pull.get("state") == "open"]
                      merged_pulls = [pull for pull in pulls if pull.get("merged") is True]
                      if dependency_mode == "pr-ready" and not open_pulls and not merged_pulls:
                          blocked = True
                          break
                      if dependency_mode == "merged" and not merged_pulls:
                          blocked = True
                          break

              if blocked:
                  continue

              comments = rest(f"https://api.github.com/repos/{repo}/issues/{issue['number']}/comments?per_page=100")
              already_triggered = False
              for comment in reversed(comments):
                  body_text = comment.get("body") or ""
                  user = comment.get("user") or {}
                  if "/opencode" in body_text and user.get("type") == "Bot":
                      already_triggered = True
                      break
                  if "/opencode" in body_text and user.get("type") != "Bot":
                      break

              if already_triggered:
                  continue

              payload = json.dumps({"body": "/opencode"}).encode("utf-8")
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/issues/{issue['number']}/comments",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "User-Agent": "github-actions"
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req):
                  pass
          PY
