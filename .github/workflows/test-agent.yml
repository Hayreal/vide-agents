name: Test Agent

on:
  issues:
    types: [opened, reopened, labeled]
  issue_comment:
    types: [created]

jobs:
  test:
    if: |
      contains(github.event.issue.labels.*.name, 'test') &&
      (
        (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
      )
    uses: ./.github/workflows/claude-agent-base.yml
    with:
      agent_name: Test Agent
      agent_label: test
      branch_prefix: claude-test
      scope_summary: Automated tests, fixtures, mocks, and verification-oriented changes.
      scope_rules: |
        - Prefer editing test-facing files only, such as test/, tests/, e2e/, fixtures/, mocks/, or spec files under src/.
        - Avoid rewriting core production logic unless a tiny supporting change is required for testability.
        - If the task is mostly product feature work, leave the tree unchanged and say the issue is out of scope.
